services:
  app:
    image: docker-app:latest
    container_name: pixelated-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PUBLIC_SITE_URL=https://pixelatedempathy.com
    networks:
      - web

  caddy:
    image: caddy:2
    container_name: pixelated-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_REMOTE_URL=http://ollama:11434
    networks:
      - web

  mcp-server:
    image: docker-mcp-server:latest
    container_name: pixelated-mcp
    restart: unless-stopped
    user: root
    ports:
      - '127.0.0.1:54321:5003'
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MEM0_API_KEY=${MEM0_API_KEY}
      - MEMORY_SERVER_PORT=5003
    networks:
      - web

  ollama:
    image: ollama/ollama:latest
    container_name: pixelated-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - web

  ai-service:
    image: docker-ai-service:latest
    container_name: pixelated-ai
    restart: unless-stopped
    user: root
    environment:
      - PORT=8000
    ports:
      - '8000:8000'
    volumes:
      - ../ai/logs:/app/logs
      - ../ai/data:/app/data
    networks:
      - web
    command:
      sh -c "mkdir -p /tmp/ai_pkg && ln -sf /app /tmp/ai_pkg/ai &&
      PYTHONPATH=/tmp/ai_pkg uv run python -m ai.main"

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  ollama_data:
